<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="google-site-verification" content="gHqDmG732_viU0VLe1OhyhcPt_JDncpNLUV5KBg5hpk">
  <title>Edo Projects Ltd</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #FFF7F0, #FFF0E6);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 3rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 72px;
      height: 72px;
      border-radius: 14px;
      margin-bottom: 1rem;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }
    .section {
      text-align: left;
      margin-bottom: 1.5rem;
    }
    .section h2 {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #999;
      margin-bottom: 0.5rem;
    }
    .section p, .section a {
      font-size: 0.95rem;
      line-height: 1.6;
    }
    a {
      color: #E8672A;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 1.5rem 0;
    }
    .app-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px;
      border-radius: 12px;
      background: #FAFAFA;
      transition: background 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .app-row:hover { background: #F0F0F0; text-decoration: none; }
    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
    }
    .app-name {
      display: block;
      font-size: 1rem;
      font-weight: 600;
      color: #333;
    }
    .app-desc {
      display: block;
      font-size: 0.85rem;
      color: #888;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.png" alt="Edo Projects" class="logo">
    <h1>Edo Projects Ltd</h1>
    <p class="subtitle">App development studio based in the United Kingdom</p>

    <div class="section">
      <h2>Our Apps</h2>
      <a href="https://zenlymindfulness.com" target="_blank" class="app-row">
        <img src="zenly-icon.png" alt="Zenly" class="app-icon">
        <div>
          <span class="app-name">Zenly</span>
          <span class="app-desc">Meditation made consistent.</span>
        </div>
      </a>
    </div>

    <hr class="divider">

    <div class="section">
      <h2>Contact</h2>
      <p><a href="mailto:edoprojectsltd@gmail.com">edoprojectsltd@gmail.com</a></p>
    </div>

    <hr class="divider">

    <p style="font-size: 0.8rem; color: #aaa; line-height: 1.6;">
      Edo Projects Ltd — Company No. 16080946<br>
      14/2e Docklands Business Center, 10-16 Tiller Road, London, E14 8PX
    </p>
  </div>
</body>
</html>
